<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画册动效展示</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
</head>
<body>
<!-- 封面层：点击进入画册 -->
<div id="cover-layer">
    <img src="./images/10开屏封面.webp" alt="封面">
</div>
<!-- 画册主体容器，默认隐藏，点击封面后显示 -->
<div class="container" id="book-container">
    <h1>画册展示</h1>
    <div id="book">
        <div class="page"><img loading="lazy" src="./images/1.webp" alt="第1页"></div>
        <div class="page"><img loading="lazy" src="./images/2.webp" alt="第2页"></div>
        <div class="page"><img loading="lazy" src="./images/3.webp" alt="第3页"></div>
        <div class="page"><img loading="lazy" src="./images/4 拷贝.webp" alt="第4页"></div>
        <div class="page"><img loading="lazy" src="./images/5.webp" alt="第5页"></div>
        <div class="page"><img loading="lazy" src="./images/6.webp" alt="第6页"></div>
        <div class="page"><img loading="lazy" src="./images/7.webp" alt="第7页"></div>
        <div class="page"><img loading="lazy" src="./images/8.webp" alt="第8页"></div>
        <div class="page"><img loading="lazy" src="./images/9.webp" alt="第9页"></div>
    </div>
    <div class="btn-group">
        <button id="prev">上一页</button>
        <button id="next">下一页</button>
    </div>
</div>
<script src="./js/main.js"></script>
</body>
</html>
