<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <meta
    name="description"
    content="江北嘴电子画册"
  >

  <title>江北嘴电子画册</title>

  <!-- 引入CSS样式 -->
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <!-- ==============================
       开屏页面
       使用 images/10.webp
       ============================== -->
  <section id="splash" class="splash">

    <img
      id="splashCover"
      class="splash__cover"
      src="./images/10.webp"
      alt="江北嘴电子画册开屏封面"
      draggable="false"
    >

    <div class="splash__mask"></div>

    <div class="splash__content">

      <button
        id="enterBtn"
        class="enter-button"
        type="button"
      >
        <span>开启画册</span>
        <span aria-hidden="true">→</span>
      </button>

      <p class="splash__tip">
        点击进入电子画册
      </p>

    </div>
  </section>


  <!-- ==============================
       画册阅读页面
       背景使用 images/11.webp
       ============================== -->
  <main
    id="reader"
    class="reader"
    aria-hidden="true"
  >

    <!-- 背景提亮层 -->
    <div class="reader__mask"></div>


    <!-- 顶部工具栏 -->
    <header class="toolbar">

      <div class="toolbar__brand">
        江北嘴电子画册
      </div>

      <div class="toolbar__actions">

        <button
          id="prevBtn"
          class="toolbar-button"
          type="button"
          aria-label="上一页"
          title="上一页"
        >
          ←
        </button>

        <div
          class="page-status"
          aria-live="polite"
        >
          <span id="currentPage">1</span>

          <span class="page-status__divider">
            /
          </span>

          <span id="totalPages">9</span>
        </div>

        <button
          id="nextBtn"
          class="toolbar-button"
          type="button"
          aria-label="下一页"
          title="下一页"
        >
          →
        </button>

        <button
          id="fullscreenBtn"
          class="toolbar-button toolbar-button--text"
          type="button"
        >
          全屏
        </button>

      </div>
    </header>


    <!-- ==============================
         画册展示区域
         ============================== -->
    <section
      id="bookStage"
      class="book-stage"
      aria-label="电子画册展示区域"
    >

      <!-- 电脑端仿真翻页 -->
      <div
        id="desktopBook"
        class="desktop-book"
      >
        <div id="book"></div>
      </div>


      <!-- 手机端单页阅读 -->
      <div
        id="mobileBook"
        class="mobile-book"
      >
        <img
          id="mobilePage"
          class="mobile-book__page"
          src="./images/1.webp"
          alt="画册第1页"
          draggable="false"
        >
      </div>


      <!-- 左侧点击翻页区域 -->
      <button
        id="leftHotspot"
        class="page-hotspot page-hotspot--left"
        type="button"
        aria-label="上一页"
      ></button>


      <!-- 右侧点击翻页区域 -->
      <button
        id="rightHotspot"
        class="page-hotspot page-hotspot--right"
        type="button"
        aria-label="下一页"
      ></button>

    </section>


    <!-- 底部说明 -->
    <footer class="reader-footer">
      电脑端：鼠标拖动或方向键翻页　·　手机端：左右滑动翻页
    </footer>

  </main>


  <noscript>
    请开启浏览器 JavaScript 后查看电子画册。
  </noscript>


  <!-- 翻页插件，必须放在main.js前面 -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

  <!-- 引入JS功能代码 -->
  <script src="./js/main.js"></script>

</body>
</html>
